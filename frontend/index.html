<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Trustora menganalisis pesan SMS dan chat berbahasa Indonesia untuk mendeteksi indikasi spam dengan model lokal yang transparan."
    />
    <meta name="theme-color" content="#0f766e" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d1418" media="(prefers-color-scheme: dark)" />
    <title>Trustora - Analisis Pesan Spam Indonesia</title>
    <script>
      // Apply saved/system theme before paint to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem("trustora-theme");
          var dark = saved
            ? saved === "dark"
            : window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
